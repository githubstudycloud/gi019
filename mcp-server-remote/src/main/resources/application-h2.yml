# H2 内存数据库 profile，用于本地测试不依赖 MySQL
# 启动: java -jar xxx.jar --spring.profiles.active=h2
spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      # 顺序加载：原有业务 → meta 元数据表 → 原有数据 → meta 种子数据
      schema-locations:
        - classpath:schema-h2.sql
        - classpath:schema-meta.sql
      data-locations:
        - classpath:data-h2.sql
        - classpath:data-meta.sql

mcp:
  skill:
    output-dir: skills

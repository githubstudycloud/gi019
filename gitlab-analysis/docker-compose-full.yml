version: '3.8'

# 完整版：包含 Pages、Prometheus 监控
# 适用于需要这些功能且 NAS 内存充足(12G+)的场景

services:
  gitlab:
    image: gitlab/gitlab-ce:18.2.2-ce.0
    container_name: gitlab
    restart: unless-stopped
    hostname: 'gitlab.local'
    privileged: false
    shm_size: '512m'

    ports:
      - "8929:80"     # HTTP
      - "2289:22"     # SSH
      - "5089:5050"   # Container Registry
      - "8980:8091"   # GitLab Pages

    environment:
      TZ: Asia/Shanghai
      GITLAB_OMNIBUS_CONFIG: |
        # === 基础 URL ===
        external_url 'http://192.168.0.99:8929'
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        gitlab_rails['gitlab_shell_ssh_port'] = 2289
        gitlab_rails['time_zone'] = 'Asia/Shanghai'

        # === 功能开关 ===
        gitlab_rails['gitlab_signup_enabled'] = false
        gitlab_rails['gitlab_email_enabled'] = false
        gitlab_rails['lfs_enabled'] = true
        gitlab_rails['gravatar_enabled'] = false
        gitlab_rails['gitlab_default_theme'] = 1
        gitlab_rails['gitlab_restricted_visibility_levels'] = []
        gitlab_rails['ldap_enabled'] = false
        gitlab_rails['omniauth_enabled'] = false

        # === Container Registry ===
        registry_external_url 'http://192.168.0.99:5089'
        gitlab_rails['registry_enabled'] = true
        registry['enable'] = true

        # === 备份 ===
        gitlab_rails['backup_keep_time'] = 604800
        gitlab_rails['backup_path'] = "/gitlab-backups"

        # === 禁用不需要的服务 ===
        gitlab_kas['enable'] = false
        grafana['enable'] = false
        mattermost['enable'] = false
        gitlab_rails['mattermost_enabled'] = false
        gitlab_rails['gitlab_duo_features_enabled'] = false

        # === GitLab Pages ===
        gitlab_pages['enable'] = true
        gitlab_pages['external_http'] = ['0.0.0.0:8091']
        gitlab_pages['external_url'] = 'http://192.168.0.99:8980'
        gitlab_pages['listen_proxy'] = 'localhost:8092'
        pages_nginx['enable'] = false

        # === 监控 ===
        prometheus_monitoring['enable'] = true
        prometheus['enable'] = true
        prometheus['listen_address'] = '127.0.0.1:9091'
        alertmanager['enable'] = false

        # === PostgreSQL ===
        postgresql['shared_buffers'] = '384MB'
        postgresql['max_connections'] = 150
        postgresql['work_mem'] = '8MB'
        postgresql['effective_cache_size'] = '1GB'
        postgresql['maintenance_work_mem'] = '96MB'
        postgresql['checkpoint_completion_target'] = 0.9
        postgresql['wal_buffers'] = '16MB'
        postgresql['default_statistics_target'] = 100

        # === Puma ===
        puma['worker_processes'] = 2
        puma['min_threads'] = 2
        puma['max_threads'] = 4
        puma['worker_timeout'] = 60
        puma['worker_killer_enabled'] = true
        puma['worker_killer_max_memory_mb'] = 1536

        # === Sidekiq ===
        sidekiq['max_concurrency'] = 8
        sidekiq['metrics_enabled'] = true
        sidekiq['listen_address'] = '127.0.0.1'
        sidekiq['listen_port'] = 8082

        # === Nginx ===
        nginx['worker_processes'] = 2
        nginx['worker_connections'] = 1024
        nginx['client_max_body_size'] = '500m'
        nginx['keepalive_timeout'] = 65
        nginx['redirect_http_to_https'] = false
        nginx['gzip_enabled'] = true
        nginx['gzip_comp_level'] = 6
        nginx['gzip_types'] = [
          'text/plain',
          'text/css',
          'application/json',
          'application/javascript',
          'text/xml',
          'application/xml',
          'application/xml+rss',
          'text/javascript',
          'image/svg+xml'
        ]

        nginx['proxy_set_headers'] = {
          "Host" => "192.168.0.99:8929",
          "X-Real-IP" => "$remote_addr",
          "X-Forwarded-For" => "$proxy_add_x_forwarded_for",
          "X-Forwarded-Proto" => "http",
          "X-Forwarded-Ssl" => "off",
          "X-Forwarded-Host" => "192.168.0.99:8929",
          "X-Forwarded-Port" => "8929",
          "Upgrade" => "$http_upgrade",
          "Connection" => "$connection_upgrade"
        }

        gitlab_workhorse['listen_network'] = "tcp"
        gitlab_workhorse['listen_addr'] = "127.0.0.1:8181"

        gitlab_rails['trusted_proxies'] = ['127.0.0.1']
        gitlab_rails['internal_api_url'] = 'http://localhost:80'

        # === Redis ===
        redis['maxmemory'] = "384mb"
        redis['maxmemory_policy'] = "allkeys-lru"
        redis['tcp_keepalive'] = 60
        redis['tcp_backlog'] = 511
        redis['save'] = ["900 1"]

        # === Gitaly ===
        gitaly['configuration'] = {
          storage: [
            {
              name: 'default',
              path: '/var/opt/gitlab/git-data/repositories'
            }
          ],
          concurrency: [
            {
              rpc: "/gitaly.SmartHTTPService/PostReceivePack",
              max_per_repo: 2,
            },
            {
              rpc: "/gitaly.SmartHTTPService/PostUploadPack",
              max_per_repo: 3,
            }
          ],
          rate_limiting: {
            rpc: [
              {
                rpc: "/gitaly.SmartHTTPService/PostUploadPack",
                interval: '1m',
                burst: 3
              }
            ]
          }
        }

        # === 日志 ===
        logging['svlogd_size'] = 50 * 1024 * 1024
        logging['svlogd_num'] = 5
        logging['logrotate_frequency'] = "weekly"
        logging['logrotate_rotate'] = 10

        # === Runner ===
        gitlab_rails['gitlab_default_projects_features_builds'] = true
        gitlab_rails['gitlab_default_projects_features_container_registry'] = true

        # === GC 优化 ===
        gitlab_rails['env'] = {
          'MALLOC_CONF' => 'dirty_decay_ms:1000,muzzy_decay_ms:1000',
          'RUBY_GC_HEAP_GROWTH_FACTOR' => '1.1',
          'RUBY_GC_MALLOC_LIMIT' => '16777216',
          'RUBY_GC_MALLOC_LIMIT_MAX' => '134217728'
        }

    volumes:
      - ./config:/etc/gitlab
      - ./logs:/var/log/gitlab
      - ./data:/var/opt/gitlab
      - ./backups:/gitlab-backups

    healthcheck:
      test: ["CMD", "/opt/gitlab/bin/gitlab-healthcheck", "--fail", "--max-time", "10"]
      interval: 120s
      timeout: 30s
      retries: 3
      start_period: 600s

    deploy:
      resources:
        limits:
          memory: 10G
          cpus: '2.0'
        reservations:
          memory: 6G
          cpus: '1.0'

    networks:
      - nginx_net001

networks:
  nginx_net001:
    external: true
    driver_opts:
      com.docker.network.enable_ipv6: "false"
